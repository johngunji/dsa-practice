<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>50-Day DSA Schedule — John</title>
<link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500;700&family=Syne:wght@400;500;700;800&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #0e0e10;
    --surface: #16161a;
    --surface2: #1e1e24;
    --border: #2a2a35;
    --accent: #7c6af7;
    --accent2: #4fc9a4;
    --amber: #f0a04b;
    --coral: #e8614f;
    --green: #6ec97a;
    --muted: #5a5a72;
    --text: #e8e8f0;
    --text2: #a0a0be;
    --mono: 'JetBrains Mono', monospace;
    --sans: 'Syne', sans-serif;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: var(--sans);
    min-height: 100vh;
  }

  /* ── header ── */
  header {
    padding: 3rem 2rem 2rem;
    border-bottom: 1px solid var(--border);
    background: var(--surface);
    position: sticky;
    top: 0;
    z-index: 100;
  }

  .header-inner {
    max-width: 1200px;
    margin: 0 auto;
    display: flex;
    align-items: flex-end;
    justify-content: space-between;
    flex-wrap: wrap;
    gap: 1rem;
  }

  .title-block h1 {
    font-size: clamp(1.6rem, 4vw, 2.4rem);
    font-weight: 800;
    letter-spacing: -0.03em;
    line-height: 1;
  }
  .title-block h1 span { color: var(--accent); }
  .title-block p {
    margin-top: .4rem;
    font-size: .85rem;
    color: var(--muted);
    font-family: var(--mono);
  }

  .header-stats {
    display: flex;
    gap: 1.5rem;
    flex-wrap: wrap;
  }
  .hstat {
    text-align: right;
  }
  .hstat-val {
    font-size: 1.5rem;
    font-weight: 700;
    font-family: var(--mono);
    color: var(--accent);
  }
  .hstat-label {
    font-size: .7rem;
    color: var(--muted);
    text-transform: uppercase;
    letter-spacing: .08em;
  }

  /* ── progress bar ── */
  .progress-wrap {
    max-width: 1200px;
    margin: 1.5rem auto 0;
    padding: 0 2rem;
  }
  .progress-track {
    height: 3px;
    background: var(--border);
    border-radius: 99px;
    overflow: hidden;
  }
  .progress-fill {
    height: 100%;
    background: linear-gradient(90deg, var(--accent), var(--accent2));
    border-radius: 99px;
    transition: width .5s ease;
  }
  .progress-label {
    display: flex;
    justify-content: space-between;
    margin-top: .4rem;
    font-size: .7rem;
    color: var(--muted);
    font-family: var(--mono);
  }

  /* ── filters ── */
  .controls {
    max-width: 1200px;
    margin: 0 auto;
    padding: 1.5rem 2rem;
    display: flex;
    gap: .6rem;
    flex-wrap: wrap;
    align-items: center;
  }

  .controls-label {
    font-size: .7rem;
    color: var(--muted);
    text-transform: uppercase;
    letter-spacing: .1em;
    font-family: var(--mono);
    margin-right: .4rem;
  }

  .pill {
    font-size: .72rem;
    padding: .35rem .9rem;
    border-radius: 99px;
    border: 1px solid var(--border);
    background: transparent;
    color: var(--muted);
    cursor: pointer;
    font-family: var(--mono);
    transition: all .15s;
    white-space: nowrap;
  }
  .pill:hover { border-color: var(--accent); color: var(--text); }
  .pill.active { background: var(--accent); border-color: var(--accent); color: #fff; }

  /* ── today jump ── */
  .today-btn {
    margin-left: auto;
    font-size: .72rem;
    padding: .35rem 1rem;
    border-radius: 99px;
    border: 1px solid var(--accent2);
    background: transparent;
    color: var(--accent2);
    cursor: pointer;
    font-family: var(--mono);
    transition: all .15s;
  }
  .today-btn:hover { background: var(--accent2); color: var(--bg); }

  /* ── legend ── */
  .legend {
    max-width: 1200px;
    margin: 0 auto;
    padding: 0 2rem 1.5rem;
    display: flex;
    gap: 1.2rem;
    flex-wrap: wrap;
  }
  .leg { display: flex; align-items: center; gap: .4rem; font-size: .72rem; color: var(--muted); font-family: var(--mono); }
  .leg-dot { width: 8px; height: 8px; border-radius: 2px; flex-shrink: 0; }

  /* ── grid ── */
  .grid {
    max-width: 1200px;
    margin: 0 auto;
    padding: 0 2rem 4rem;
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(320px, 1fr));
    gap: 12px;
  }

  /* ── card ── */
  .card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 1.1rem 1.2rem;
    transition: border-color .2s, transform .15s;
    position: relative;
    overflow: hidden;
  }
  .card:hover { border-color: #3a3a50; transform: translateY(-1px); }
  .card.hidden { display: none; }

  /* stage accent strip */
  .card::before {
    content: '';
    position: absolute;
    top: 0; left: 0;
    width: 3px; height: 100%;
    border-radius: 12px 0 0 12px;
  }
  .card.trees::before { background: #378ADD; }
  .card.graphs::before { background: var(--accent); }
  .card.dp::before { background: var(--coral); }
  .card.greedy::before { background: var(--green); }
  .card.backtrack::before { background: var(--amber); }
  .card.rest::before { background: var(--accent2); }

  /* today highlight */
  .card.today-card {
    border-color: var(--accent2);
    box-shadow: 0 0 0 1px var(--accent2);
  }
  .card.today-card::after {
    content: '◉ TODAY';
    position: absolute;
    top: .8rem; right: .8rem;
    font-size: .6rem;
    color: var(--accent2);
    font-family: var(--mono);
    letter-spacing: .1em;
    animation: pulse 2s ease-in-out infinite;
  }
  @keyframes pulse {
    0%, 100% { opacity: 1; }
    50% { opacity: 0.4; }
  }

  /* past day dimming */
  .card.past { opacity: .5; }
  .card.past:hover { opacity: .75; }

  /* card top row */
  .card-top {
    display: flex;
    align-items: flex-start;
    justify-content: space-between;
    margin-bottom: .75rem;
    gap: .5rem;
  }

  .day-info {}
  .day-num {
    font-size: .65rem;
    color: var(--muted);
    font-family: var(--mono);
    letter-spacing: .05em;
    margin-bottom: 1px;
  }
  .day-date {
    font-size: 1rem;
    font-weight: 700;
    line-height: 1.2;
    letter-spacing: -.01em;
  }
  .day-weekday {
    font-size: .72rem;
    color: var(--muted);
    font-family: var(--mono);
  }

  .badge {
    font-size: .62rem;
    padding: .25rem .7rem;
    border-radius: 99px;
    font-family: var(--mono);
    font-weight: 500;
    flex-shrink: 0;
    margin-top: .15rem;
  }
  .badge-trees { background: rgba(55,138,221,.15); color: #378ADD; border: 1px solid rgba(55,138,221,.3); }
  .badge-graphs { background: rgba(124,106,247,.15); color: var(--accent); border: 1px solid rgba(124,106,247,.3); }
  .badge-dp { background: rgba(232,97,79,.15); color: var(--coral); border: 1px solid rgba(232,97,79,.3); }
  .badge-greedy { background: rgba(110,201,122,.15); color: var(--green); border: 1px solid rgba(110,201,122,.3); }
  .badge-backtrack { background: rgba(240,160,75,.15); color: var(--amber); border: 1px solid rgba(240,160,75,.3); }
  .badge-rest { background: rgba(79,201,164,.15); color: var(--accent2); border: 1px solid rgba(79,201,164,.3); }

  /* video resources */
  .videos-section {
    margin-top: .75rem;
    border-top: 1px solid var(--border);
    padding-top: .6rem;
  }
  .videos-toggle {
    display: flex;
    align-items: center;
    gap: .4rem;
    cursor: pointer;
    font-size: .7rem;
    font-family: var(--mono);
    color: var(--accent2);
    text-transform: uppercase;
    letter-spacing: .08em;
    background: none;
    border: none;
    padding: 0;
    user-select: none;
  }
  .videos-toggle:hover { color: var(--text); }
  .videos-toggle .arrow { transition: transform .2s; display: inline-block; }
  .videos-toggle.open .arrow { transform: rotate(90deg); }
  .videos-list {
    display: none;
    flex-direction: column;
    gap: .3rem;
    margin-top: .5rem;
  }
  .videos-list.open { display: flex; }
  .vid-link {
    display: flex;
    align-items: center;
    gap: .5rem;
    font-size: .72rem;
    font-family: var(--mono);
    color: var(--text2);
    text-decoration: none;
    padding: .25rem .4rem;
    border-radius: 4px;
    border: 1px solid transparent;
    transition: all .15s;
  }
  .vid-link:hover {
    color: var(--accent2);
    border-color: var(--accent2);
    background: rgba(79,201,164,.06);
  }
  .vid-link .vid-icon { font-size: .85rem; flex-shrink: 0; }
  .vid-label { flex: 1; line-height: 1.3; }
  .vid-src {
    font-size: .62rem;
    color: var(--muted);
    flex-shrink: 0;
  }

  /* problems list */
  .problems {
    margin-bottom: .75rem;
  }
  .prob-item {
    font-size: .78rem;
    color: var(--text2);
    font-family: var(--mono);
    padding: .22rem 0;
    border-bottom: 1px solid transparent;
    display: flex;
    align-items: center;
    gap: .5rem;
    cursor: pointer;
    transition: color .12s;
  }
  .prob-item:hover { color: var(--text); }
  .prob-item.done { color: var(--muted); text-decoration: line-through; }
  .prob-item.done .check { color: var(--accent2); }
  .check {
    width: 14px;
    height: 14px;
    border-radius: 3px;
    border: 1px solid var(--border);
    flex-shrink: 0;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: .55rem;
    color: transparent;
    transition: all .15s;
  }
  .prob-item.done .check {
    background: var(--accent2);
    border-color: var(--accent2);
    color: var(--bg);
  }

  /* rest note */
  .rest-note {
    font-size: .8rem;
    color: var(--accent2);
    line-height: 1.6;
    font-family: var(--mono);
    padding: .5rem .75rem;
    background: rgba(79,201,164,.07);
    border-radius: 8px;
    margin-bottom: .75rem;
  }

  /* revision */
  .revision {
    padding-top: .65rem;
    border-top: 1px solid var(--border);
  }
  .rev-label {
    font-size: .6rem;
    text-transform: uppercase;
    letter-spacing: .1em;
    color: var(--muted);
    font-family: var(--mono);
    margin-bottom: .35rem;
  }
  .rev-item {
    font-size: .72rem;
    color: var(--muted);
    font-family: var(--mono);
    padding: .15rem 0;
    line-height: 1.5;
  }
  .rev-item::before { content: '↩ '; color: var(--accent); }

  /* checkbox progress per card */
  .card-progress {
    margin-top: .65rem;
    height: 2px;
    background: var(--border);
    border-radius: 99px;
    overflow: hidden;
  }
  .card-progress-fill {
    height: 100%;
    border-radius: 99px;
    background: var(--accent2);
    transition: width .3s;
  }

  /* ── week divider ── */
  .week-divider {
    grid-column: 1 / -1;
    border-top: 1px solid var(--border);
    padding-top: .5rem;
    font-size: .65rem;
    color: var(--muted);
    font-family: var(--mono);
    letter-spacing: .1em;
    text-transform: uppercase;
  }

  /* scrollbar */
  ::-webkit-scrollbar { width: 6px; }
  ::-webkit-scrollbar-track { background: var(--bg); }
  ::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }
</style>
</head>
<body>

  <div class="header-inner">

</header>

<div class="controls">

</div>

<div class="legend">

</div>

<div class="grid" id="grid"></div>

  { tag:'rest', badge:'Rest', isRest:true, restNote:'Day 50 — Final mock revision. Timed speed-run of landmarks from every stage.', rev:['198 – House Robber (5 min)','200 – Islands (8 min)','300 – LIS (10 min)','56 – Merge Intervals (8 min)','46 – Permutations (10 min)','297 – Serialize BT (15 min)'] },
];

const DAYS_OF_WEEK = ['Sunday','Monday','Tuesday','Wednesday','Thursday','Friday','Saturday'];
const MONTHS = ['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];

function getDate(dayIndex) {
  const d = new Date(START);
  d.setDate(d.getDate() + dayIndex);
  return d;
}

function formatDate(d) {
  return `${DAYS_OF_WEEK[d.getDay()]}, ${d.getDate()} ${MONTHS[d.getMonth()]} ${d.getFullYear()}`;
}

function shortDate(d) {
  return `${d.getDate()} ${MONTHS[d.getMonth()]}`;
}

const STATE_KEY = 'dsa50_checks_v2';

function loadState() {
  try { return JSON.parse(localStorage.getItem(STATE_KEY)) || {}; } catch { return {}; }
}

function saveState(s) {
  localStorage.setItem(STATE_KEY, JSON.stringify(s));
}

let state = loadState();
const today = new Date();
today.setHours(0,0,0,0);

function isToday(d) { const x = new Date(d); x.setHours(0,0,0,0); return x.getTime() === today.getTime(); }
function isPast(d) { const x = new Date(d); x.setHours(0,0,0,0); return x.getTime() < today.getTime(); }

function toggleCheck(dayIdx, probIdx) {
  const key = `${dayIdx}_${probIdx}`;
  state[key] = !state[key];
  saveState(state);
  renderStats();
  updateCard(dayIdx);
}

function updateCard(dayIdx) {
  const card = document.getElementById(`card-${dayIdx}`);
  if (!card) return;
  const day = DAYS[dayIdx];
  if (day.isRest) return;
  const total = day.solve.length;
  const done = day.solve.filter((_,i) => state[`${dayIdx}_${i}`]).length;
  const fill = card.querySelector('.card-progress-fill');
  if (fill) fill.style.width = (done/total*100) + '%';
  day.solve.forEach((_,i) => {
    const item = card.querySelector(`[data-prob="${dayIdx}_${i}"]`);
    if (!item) return;
    const chk = item.querySelector('.check');
    if (state[`${dayIdx}_${i}`]) {
      item.classList.add('done');
      chk.textContent = '✓';
    } else {
      item.classList.remove('done');
      chk.textContent = '';
    }
  });
}

function renderStats() {
  let total = 0;
  DAYS.forEach((day, di) => {
    if (day.isRest) return;
    day.solve.forEach((_,pi) => { if (state[`${di}_${pi}`]) total++; });
  });

  // today's count
  const todayIdx = DAYS.findIndex((_,i) => isToday(getDate(i)));
  let todayDone = 0;
  if (todayIdx >= 0) {
    DAYS[todayIdx].solve && DAYS[todayIdx].solve.forEach((_,pi) => { if (state[`${todayIdx}_${pi}`]) todayDone++; });
  }

  document.getElementById('stat-done').textContent = todayDone;
  document.getElementById('stat-total').textContent = total;
  document.getElementById('global-bar').style.width = Math.min(100, total/250*100) + '%';
  document.getElementById('prog-left').textContent = `${total} / 250 problems checked`;
  document.getElementById('prog-pct').textContent = Math.round(total/250*100) + '%';
}

function buildGrid() {
  const grid = document.getElementById('grid');
  grid.innerHTML = '';

  let week = 0;
  DAYS.forEach((day, i) => {
    const date = getDate(i);
    const w = Math.floor(i / 7);
    if (w !== week) {
      week = w;
      const divider = document.createElement('div');
      divider.className = 'week-divider';
      const wStart = getDate(w*7);
      const wEnd = getDate(Math.min(w*7+6, 49));
      divider.textContent = `Week ${w+1} — ${shortDate(wStart)} to ${shortDate(wEnd)}`;
      grid.appendChild(divider);
    }

    const card = document.createElement('div');
    card.id = `card-${i}`;
    card.className = `card ${day.tag}`;
    if (isToday(date)) card.classList.add('today-card');
    else if (isPast(date)) card.classList.add('past');

    const badgeClass = `badge-${day.tag}`;
    const total = day.solve ? day.solve.length : 0;
    const done = day.solve ? day.solve.filter((_,pi) => state[`${i}_${pi}`]).length : 0;

    let html = `<div class="card-top">
      <div class="day-info">
        <div class="day-num">Day ${i+1}</div>
        <div class="day-date">${shortDate(date)}</div>
        <div class="day-weekday">${DAYS_OF_WEEK[date.getDay()]}</div>
      </div>
      <span class="badge ${badgeClass}">${day.badge}</span>
    </div>`;

    if (day.isRest) {
      html += `<div class="rest-note">${day.restNote}</div>`;
    } else {
      html += `<div class="problems">`;
      day.solve.forEach((p, pi) => {
        const checked = state[`${i}_${pi}`] || false;
        html += `<div class="prob-item${checked?' done':''}" data-prob="${i}_${pi}" onclick="toggleCheck(${i},${pi})">
          <span class="check">${checked?'✓':''}</span>${p}</div>`;
      });
      html += `</div>`;
      html += `<div class="card-progress"><div class="card-progress-fill" style="width:${total?done/total*100:0}%"></div></div>`;
    }

    if (day.videos && day.videos.length) {
      const vid_id = `vids-${i}`;
      html += `<div class="videos-section">
        <button class="videos-toggle" onclick="toggleVids('${vid_id}',this)">
          <span class="arrow">▶</span> Watch first (${day.videos.length} videos)
        </button>
        <div class="videos-list" id="${vid_id}">`;
      day.videos.forEach(v => {
        html += `<a class="vid-link" href="${v.url}" target="_blank" rel="noopener">
          <span class="vid-icon">▶</span>
          <span class="vid-label">${v.label}</span>
          <span class="vid-src">${v.src}</span>
        </a>`;
      });
      html += `</div></div>`;
    }

    if (day.rev && day.rev.length) {
      html += `<div class="revision"><div class="rev-label">Revise tonight</div>`;
      day.rev.forEach(r => { html += `<div class="rev-item">${r}</div>`; });
      html += `</div>`;
    }

    card.innerHTML = html;
    grid.appendChild(card);
  });
}

function filter(tag, btn) {
  document.querySelectorAll('.pill').forEach(p => p.classList.remove('active'));
  btn.classList.add('active');
  document.querySelectorAll('.card').forEach(c => {
    c.classList.toggle('hidden', tag !== 'all' && !c.classList.contains(tag));
  });
  document.querySelectorAll('.week-divider').forEach(d => d.classList.remove('hidden'));
}

function scrollToToday() {
  const todayCard = document.querySelector('.today-card');
  if (todayCard) todayCard.scrollIntoView({ behavior: 'smooth', block: 'center' });
}

function toggleVids(id, btn) {
  const list = document.getElementById(id);
  const open = list.classList.toggle('open');
  btn.classList.toggle('open', open);
}

buildGrid();
renderStats();

// update header sub with date range
const endDate = getDate(49);
document.getElementById('header-sub').textContent =
  `John Gunji · IIT (ISM) Dhanbad · ${shortDate(START)} – ${shortDate(endDate)} ${endDate.getFullYear()}`;
</script>
</body>
</html>
